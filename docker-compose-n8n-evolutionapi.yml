services:
  # --- n8n ---
  n8n:
    image: n8nio/n8n
    container_name: n8n_app
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=darcie-semitropical-todd.ngrok-free.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://darcie-semitropical-todd.ngrok-free.dev/
      - GENERIC_TIMEZONE=America/Lima
    volumes:
      - n8n_data:/home/node/.n8n

  # --- Evolution API (Versión Pro con PostgreSQL) ---
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=aybar_secure_token_2025
      - STORE_MESSAGES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://evo_user:evo_password@postgres_evolution:5432/evolution_db?sslmode=disable
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis_evolution:6379
      - CACHE_REDIS_SAVE_INSTANCES=false
    depends_on:
      - postgres_evolution
      - redis_evolution

  # --- Postgres Principal para Evolution ---
  postgres_evolution:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    ports:
      - "5432:5432" # <-- AHORA ACCESIBLE DESDE DBEAVER
    environment:
      - POSTGRES_USER=evo_user
      - POSTGRES_PASSWORD=evo_password
      - POSTGRES_DB=evolution_db
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  # --- Redis para Sesiones ---
  redis_evolution:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    ports:
      - "6379:6379" # <-- AHORA ACCESIBLE DESDE DBEAVER

volumes:
  n8n_data:
    external: false
  evolution_postgres_data:
    external: false
