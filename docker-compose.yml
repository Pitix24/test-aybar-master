services:
  n8n:
    image: n8nio/n8n
    container_name: n8n_app
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=darcie-semitropical-todd.ngrok-free.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://darcie-semitropical-todd.ngrok-free.dev/
      - GENERIC_TIMEZONE=America/Lima
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    external: false
